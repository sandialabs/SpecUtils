name: C Bindings

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: C on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flt-parse-method: FromChars
            artifact-name: specutils-c-linux-x86_64
          - os: macos-latest
            flt-parse-method: FastFloat
            artifact-name: specutils-c-macos-arm64
          - os: windows-latest
            flt-parse-method: FromChars
            artifact-name: specutils-c-windows-x86_64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up CMake
      uses: jwlawson/actions-setup-cmake@v2.0.2
      with:
        cmake-version: '3.25'

    - name: Install zlib (Windows)
      if: runner.os == 'Windows'
      run: vcpkg install zlib:x64-windows-static

    - name: Create build directory
      run: mkdir build

    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      run: >
        cmake -S ${{ github.workspace }} -B build
        -DSpecUtils_SHARED_LIB=ON
        -DSpecUtils_C_BINDINGS=ON
        -DSpecUtils_ENABLE_URI_SPECTRA=OFF
        -DSpecUtils_ENABLE_D3_CHART=ON
        -DSpecUtils_D3_SUPPORT_FILE_STATIC=ON
        -DSpecUtils_FLT_PARSE_METHOD=${{ matrix.flt-parse-method }}
        -DSpecUtils_FETCH_FAST_FLOAT=ON
        -DCMAKE_BUILD_TYPE=Release

    - name: Configure CMake (macOS)
      if: runner.os == 'macOS'
      run: >
        cmake -S ${{ github.workspace }} -B build
        -DSpecUtils_SHARED_LIB=ON
        -DSpecUtils_C_BINDINGS=ON
        -DSpecUtils_ENABLE_URI_SPECTRA=ON
        -DSpecUtils_ENABLE_D3_CHART=ON
        -DSpecUtils_D3_SUPPORT_FILE_STATIC=ON
        -DSpecUtils_FLT_PARSE_METHOD=${{ matrix.flt-parse-method }}
        -DSpecUtils_FETCH_FAST_FLOAT=ON
        -DCMAKE_BUILD_TYPE=Release

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: >
        cmake -S ${{ github.workspace }} -B build
        -DSpecUtils_SHARED_LIB=ON
        -DSpecUtils_C_BINDINGS=ON
        -DSpecUtils_ENABLE_URI_SPECTRA=ON
        -DZLIB_USE_STATIC_LIBS=ON
        -DVCPKG_TARGET_TRIPLET=x64-windows-static
        -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        -DSpecUtils_ENABLE_D3_CHART=ON
        -DSpecUtils_D3_SUPPORT_FILE_STATIC=ON
        -DSpecUtils_FLT_PARSE_METHOD=${{ matrix.flt-parse-method }}
        -DSpecUtils_FETCH_FAST_FLOAT=ON
        -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Collect artifacts (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p artifacts
        cp build/libSpecUtils.so artifacts/
        cp bindings/c/SpecUtils_c.h artifacts/
        cp LICENSE.txt artifacts/

    - name: Collect artifacts (macOS)
      if: runner.os == 'macOS'
      run: |
        mkdir -p artifacts
        cp build/libSpecUtils.dylib artifacts/
        cp bindings/c/SpecUtils_c.h artifacts/
        cp LICENSE.txt artifacts/

    - name: Collect artifacts (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        mkdir -p artifacts
        cp build/Release/SpecUtils.dll artifacts/ 2>/dev/null || cp build/Release/libSpecUtils.dll artifacts/ 2>/dev/null || cp build/SpecUtils.dll artifacts/ 2>/dev/null || true
        cp build/Release/SpecUtils.lib artifacts/ 2>/dev/null || cp build/Release/libSpecUtils.lib artifacts/ 2>/dev/null || cp build/SpecUtils.lib artifacts/ 2>/dev/null || true
        cp bindings/c/SpecUtils_c.h artifacts/
        cp LICENSE.txt artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: artifacts/

  update-bleeding-edge:
    needs: [build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    uses: ./.github/workflows/update-bleeding-edge.yml
    with:
      artifacts: |
        [
          {"artifact-name": "specutils-c-linux-x86_64", "release-asset-name": "specutils-c-linux-x86_64.zip"},
          {"artifact-name": "specutils-c-macos-arm64", "release-asset-name": "specutils-c-macos-arm64.zip"},
          {"artifact-name": "specutils-c-windows-x86_64", "release-asset-name": "specutils-c-windows-x86_64.zip"}
        ]
    permissions:
      contents: write
